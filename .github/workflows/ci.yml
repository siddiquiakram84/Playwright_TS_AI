name: E2E Automation CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      project:
        description: 'Test project to run (ui | api | hybrid | all)'
        required: false
        default: 'all'

env:
  NODE_VERSION: '20'
  ALLURE_VERSION: '2.30.0'

jobs:
  test-api:
    name: API Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run API tests
        run: npx playwright test --project=api
        env:
          ENV: test
          UI_BASE_URL: https://automationexercise.com
          API_BASE_URL: https://fakestoreapi.com
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          DEFAULT_TIMEOUT: 30000
          API_TIMEOUT: 15000
          ALLURE_RESULTS_DIR: allure-results

      - name: Upload API test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-results
          path: |
            allure-results/
            playwright-report/
          retention-days: 14

  test-ui:
    name: UI Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run UI tests
        run: npx playwright test --project=ui
        env:
          ENV: test
          UI_BASE_URL: https://automationexercise.com
          API_BASE_URL: https://fakestoreapi.com
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          DEFAULT_TIMEOUT: 30000
          API_TIMEOUT: 15000
          ALLURE_RESULTS_DIR: allure-results

      - name: Upload UI test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-results
          path: |
            allure-results/
            playwright-report/
            test-results/
          retention-days: 14

  test-hybrid:
    name: Hybrid Tests
    runs-on: ubuntu-latest
    needs: [test-api, test-ui]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run hybrid tests
        run: npx playwright test --project=hybrid
        env:
          ENV: test
          UI_BASE_URL: https://automationexercise.com
          API_BASE_URL: https://fakestoreapi.com
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          DEFAULT_TIMEOUT: 30000
          API_TIMEOUT: 15000
          ALLURE_RESULTS_DIR: allure-results

      - name: Upload hybrid test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hybrid-test-results
          path: |
            allure-results/
            playwright-report/
          retention-days: 14

  allure-report:
    name: Publish Allure Report
    runs-on: ubuntu-latest
    needs: [test-api, test-ui, test-hybrid]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download all test artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Merge allure results
        run: |
          mkdir -p allure-results
          find artifacts/ -name '*.json' -path '*/allure-results/*' -exec cp {} allure-results/ \;

      - name: Generate Allure report
        uses: simple-elf/allure-report-action@v1.9
        with:
          allure_results: allure-results
          allure_report: allure-report
          allure_history: allure-history

      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
