apiVersion: 1

datasources:
  - name: InfluxDB-Playwright
    uid: influxdb-playwright
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    isDefault: true
    jsonData:
      version: Flux
      organization: playwright
      defaultBucket: testresults
      tlsSkipVerify: true
    secureJsonData:
      token: ${INFLUXDB_TOKEN:-mytoken}
    editable: false
